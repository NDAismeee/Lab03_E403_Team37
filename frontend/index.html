<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatbot vs Agent Demo (Phone Store)</title>
    <style>
      :root { color-scheme: light; }
      body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; background: #0b1220; color: #e6edf7; }
      .wrap { max-width: 1100px; margin: 0 auto; padding: 18px; }
      .top { display: flex; gap: 12px; align-items: center; justify-content: space-between; flex-wrap: wrap; }
      h1 { font-size: 18px; margin: 0; font-weight: 650; letter-spacing: 0.2px; }
      .hint { font-size: 12px; opacity: 0.8; }
      .card { background: #0f1a33; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 14px; }
      .row { display: grid; grid-template-columns: 1fr auto; gap: 10px; margin-top: 14px; }
      textarea { width: 100%; min-height: 64px; resize: vertical; border-radius: 10px; border: 1px solid rgba(255,255,255,0.12); background: #0b1530; color: #e6edf7; padding: 10px; outline: none; }
      button { border: 0; border-radius: 10px; padding: 10px 14px; background: #4f7cff; color: white; font-weight: 650; cursor: pointer; }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
      .colTitle { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
      .badge { font-size: 12px; padding: 4px 8px; border-radius: 999px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.10); }
      pre { margin: 0; white-space: pre-wrap; word-break: break-word; background: #0b1530; border: 1px solid rgba(255,255,255,0.10); border-radius: 10px; padding: 10px; min-height: 120px; }
      .meta { font-size: 12px; opacity: 0.85; margin-top: 8px; display: flex; gap: 10px; flex-wrap: wrap; }
      .err { color: #ffb4b4; }
      @media (max-width: 900px) { .cols { grid-template-columns: 1fr; } .row { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <div>
          <h1>Chatbot vs ReAct Agent — Phone Store Demo</h1>
          <div class="hint">Same question, two systems. Left: normal chatbot. Right: tool-using agent.</div>
        </div>
        <div class="hint">Backend: <span id="backend">/api</span></div>
      </div>

      <div class="card">
        <div class="row">
          <textarea id="q" placeholder="Example: I want to buy 2 iPhone 15 128GB. Any discount 10%? Total price?"></textarea>
          <button id="go">Compare</button>
        </div>

        <div class="cols">
          <div class="card">
            <div class="colTitle">
              <div><strong>Chatbot</strong></div>
              <div class="badge" id="chatbotStatus">idle</div>
            </div>
            <pre id="chatbotOut"></pre>
            <div class="meta" id="chatbotMeta"></div>
          </div>
          <div class="card">
            <div class="colTitle">
              <div><strong>Agent</strong></div>
              <div class="badge" id="agentStatus">idle</div>
            </div>
            <pre id="agentOut"></pre>
            <div class="meta" id="agentMeta"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      const btn = $("go");
      const q = $("q");

      const setStatus = (who, text) => {
        $(who + "Status").textContent = text;
      };

      const setOut = (who, text) => {
        $(who + "Out").textContent = text || "";
      };

      const setMeta = (who, meta) => {
        const el = $(who + "Meta");
        el.innerHTML = "";
        if (!meta) return;
        Object.entries(meta).forEach(([k, v]) => {
          const span = document.createElement("span");
          span.textContent = `${k}: ${v}`;
          el.appendChild(span);
        });
      };

      async function ask(endpoint) {
        const res = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: q.value })
        });
        const data = await res.json();
        return { ok: res.ok, status: res.status, data };
      }

      async function run() {
        const message = q.value.trim();
        if (!message) return;

        btn.disabled = true;
        setStatus("chatbot", "loading");
        setStatus("agent", "loading");
        setOut("chatbot", "");
        setOut("agent", "");
        setMeta("chatbot", null);
        setMeta("agent", null);

        const t0 = performance.now();
        const [c, a] = await Promise.all([
          ask("/api/chatbot"),
          ask("/api/agent"),
        ]);
        const t1 = performance.now();

        if (c.ok) {
          setOut("chatbot", c.data.answer || "");
          setMeta("chatbot", { ms: c.data.latency_ms ?? "-", provider: c.data.provider ?? "-", model: c.data.model ?? "-" });
          setStatus("chatbot", "done");
        } else {
          setOut("chatbot", JSON.stringify(c.data, null, 2));
          setMeta("chatbot", { error: c.status });
          setStatus("chatbot", "error");
        }

        if (a.ok) {
          setOut("agent", a.data.answer || "");
          setMeta("agent", { ms: a.data.latency_ms ?? "-", provider: a.data.provider ?? "-", model: a.data.model ?? "-", steps: a.data.steps ?? "-" });
          setStatus("agent", "done");
        } else {
          setOut("agent", JSON.stringify(a.data, null, 2));
          setMeta("agent", { error: a.status });
          setStatus("agent", "error");
        }

        btn.disabled = false;
      }

      btn.addEventListener("click", run);
      q.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) run();
      });
    </script>
  </body>
</html>
